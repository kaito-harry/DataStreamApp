# actr.toml — DataStreamApp Linked Runtime Configuration (dev environment)
#
# DataStreamApp is linked mode (ActrNode.linked), no actr build.
# This file is read directly by ActrNode.linked() as runtime config.
#
# Actor type defined in Swift code:
#   ActrType(manufacturer: "acmeharry", name: "DuplexStreamProbeClient", version: "1.0.0")

[signaling]
url = "ws://192.168.212.112:8080/signaling/ws"

[ais_endpoint]
url = "http://192.168.212.112:8080/ais"

[deployment]
realm_id = 1001
realm_secret = "rs_TI1u7FdVIrp1giKCd580-Ap42mE7-kmx"

[discovery]
visible = true

[observability]
filter_level = "info"
tracing_enabled = false

[webrtc]
force_relay = false
stun_urls = ["stun:192.168.212.112:3478"]
turn_urls = ["turn:192.168.212.112:3478"]

[acl]

