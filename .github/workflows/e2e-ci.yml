name: E2E DataStream Probe CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      # ── Setup ──────────────────────────────────────────────
      - name: Resolve host IP
        id: host-ip
        run: |
          HOST_IP=$(ipconfig getifaddr en0)
          echo "host_ip=$HOST_IP" >> $GITHUB_OUTPUT
          echo "Resolved host IP: $HOST_IP"

      - name: Checkout DataStreamApp
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Xcode 26 not found at /Applications/Xcode_26*.app; falling back to default Xcode"
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select --switch "$XCODE_PATH"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install runtime dependencies
        run: brew install libgit2 openssl@3

      # ── Start actrix ────────────────────────────────────────
      - name: Start actrix
        run: |
          chmod +x ci/bin/actrix ci/bin/actr
          mkdir -p /tmp/actrix-ci/db
          cp ci/actrix-config.toml /tmp/actrix-ci/config.toml
          ./ci/bin/actrix --config /tmp/actrix-ci/config.toml &
          ACTRIX_PID=$!
          echo "ACTRIX_PID=$ACTRIX_PID" >> $GITHUB_ENV

          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "actrix ready (attempt $i)"
              break
            fi
            if ! kill -0 $ACTRIX_PID 2>/dev/null; then
              echo "actrix died unexpectedly"
              exit 1
            fi
            sleep 1
          done

          # Register manufacturer key with far-future expiry
          echo "=== Registering MFR key ==="
          PUBKEY=$(python3 -c "import json; print(json.load(open('ci/dev-pubkey.json'))['public_key'])")
          NOW=$(date +%s)
          EXPIRES=$((NOW + 315360000))
          sqlite3 /tmp/actrix-ci/db/actrix.db << SQL
          INSERT OR REPLACE INTO mfr (name, public_key, key_id, status, created_at, verified_at, key_expires_at)
          VALUES ('actrium', '$PUBKEY', 'mfr-3c26d99da4503044', 'active', $NOW, $NOW, $EXPIRES);
          SQL
          sqlite3 /tmp/actrix-ci/db/actrix.db "SELECT id, name, key_id, status, datetime(key_expires_at, 'unixepoch') FROM mfr WHERE name='actrium';"

      - name: Create CI realm
        id: realm
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/admin/api/auth/login \
            -H 'Content-Type: application/json' -d '{"password":"ci-test-pass"}' | jq -r '.token')

          RESP=$(curl -s -X POST http://localhost:8080/admin/api/realms \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"name":"ci-test-realm","enabled":true}')

          echo "$RESP" | jq .
          REALM_ID=$(echo "$RESP" | jq -r '.realm.realm_id')
          REALM_SECRET=$(echo "$RESP" | jq -r '.realm_secret')
          echo "realm_id=$REALM_ID" >> $GITHUB_OUTPUT
          echo "realm_secret=$REALM_SECRET" >> $GITHUB_OUTPUT

      # ── Start datastream-service ────────────────────────────
      - name: Start datastream-service
        run: |
          HOST_IP="${{ steps.host-ip.outputs.host_ip }}"
          REALM_ID="${{ steps.realm.outputs.realm_id }}"
          REALM_SECRET="${{ steps.realm.outputs.realm_secret }}"
          PACKAGE_PATH="$(pwd)/ci/datastream-service.actr"
          PUBKEY_PATH="$(pwd)/ci/dev-pubkey.json"

          cat > /tmp/actrix-ci/service-actr.toml << SVCTOML
          [signaling]
          url = "ws://127.0.0.1:8080/signaling/ws"

          [ais_endpoint]
          url = "http://127.0.0.1:8080/ais"

          [deployment]
          realm_id = $REALM_ID
          realm_secret = "$REALM_SECRET"

          [discovery]
          visible = true

          [observability]
          filter_level = "info"
          tracing_enabled = false

          [webrtc]
          force_relay = false
          stun_urls = ["stun:$HOST_IP:3478"]
          turn_urls = ["turn:$HOST_IP:3478"]

          [package]
          path = "$PACKAGE_PATH"

          [[trust]]
          kind = "static"
          pubkey_file = "$PUBKEY_PATH"
          SVCTOML

          echo "=== Service config ==="
          cat /tmp/actrix-ci/service-actr.toml

          ci/bin/actr run -c /tmp/actrix-ci/service-actr.toml -d > /tmp/actr-output.log 2>&1 || {
            echo "=== actr launch failed ==="
            cat /tmp/actr-output.log
            exit 1
          }
          cat /tmp/actr-output.log

          # Wait 30s for AIS/Signer to recover from startup race
          sleep 30

          echo "=== AIS health ==="
          curl -sv http://127.0.0.1:8080/ais 2>&1 | head -20 || true

          echo "=== Child logs ==="
          for f in /Users/runner/.actr/hyper/logs/actr-*.log; do
            [ -f "$f" ] && echo "--- $f ---" && tail -100 "$f"
          done
          CHILD_LOG=$(ls -t /Users/runner/.actr/hyper/logs/actr-*.log 2>/dev/null | head -1)

          TOKEN=$(curl -s -X POST http://localhost:8080/admin/api/auth/login \
            -H 'Content-Type: application/json' -d '{"password":"ci-test-pass"}' | jq -r '.token')

          echo "=== Signaling cache ==="
          sqlite3 /tmp/actrix-ci/db/signaling_cache.db ".tables" 2>/dev/null || echo "(no cache db)"
          sqlite3 /tmp/actrix-ci/db/signaling_cache.db "SELECT * FROM service_registry;" 2>/dev/null || true

          echo "=== actrix node services ==="
          curl -s http://localhost:8080/admin/api/node -H "Authorization: Bearer $TOKEN" | jq '.services'

          # Check if datastream-service is still running
          if ! pgrep -f "actr.*service-actr" > /dev/null 2>&1; then
            echo "WARNING: datastream-service may not be running"
          fi

      # ── Build DataStreamApp ─────────────────────────────────
      - name: Inject host IP and build
        id: build
        run: |
          HOST_IP="${{ steps.host-ip.outputs.host_ip }}"
          REALM_ID="${{ steps.realm.outputs.realm_id }}"
          REALM_SECRET="${{ steps.realm.outputs.realm_secret }}"

          sed "s/__HOST_IP__/${HOST_IP}/g; s/__REALM_ID__/${REALM_ID}/g; s/__REALM_SECRET__/${REALM_SECRET}/g" \
            ci/actr-data-stream-app.toml > actr.toml

          xcodegen generate

          # Pick first available iPhone simulator (fallback chain)
          SIM_NAME="iPhone 17 Pro Max"
          if ! xcrun simctl list devices available "$SIM_NAME" 2>/dev/null | grep -q "$SIM_NAME"; then
            echo "iPhone 17 Pro Max not available, trying alternatives..."
            # List all available iPhone simulators and pick the first one
            SIM_NAME=$(xcrun simctl list devices available iPhone 2>/dev/null | grep -oE 'iPhone [0-9]+( Pro( Max)?)?' | head -1)
            if [ -z "$SIM_NAME" ]; then
              echo "ERROR: No iPhone simulator available"
              xcrun simctl list devices available
              exit 1
            fi
          fi
          echo "Using simulator: $SIM_NAME"

          xcodebuild -project DataStreamApp.xcodeproj -scheme DataStreamApp \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            -derivedDataPath /tmp/dd \
            build > /tmp/xcodebuild.log 2>&1 || {
            echo "=== xcodebuild failed (last 60 lines) ==="
            tail -60 /tmp/xcodebuild.log
            exit 1
          }
          echo "=== xcodebuild succeeded (last 20 lines) ==="
          tail -20 /tmp/xcodebuild.log

          APP_PATH=$(find /tmp/dd -name "DataStreamApp.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in /tmp/dd"
            find /tmp/dd -name "*.app" -type d || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"
          echo "sim_name=$SIM_NAME" >> $GITHUB_OUTPUT
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      # ── Run probes ──────────────────────────────────────────
      - name: Run E2E probes
        id: probes
        run: |
          HOST_IP="${{ steps.host-ip.outputs.host_ip }}"
          SIM_NAME="${{ steps.build.outputs.sim_name }}"
          APP_PATH="${{ steps.build.outputs.app_path }}"

          # Always restart datastream-service to ensure fresh signaling connection
          echo "=== Restarting datastream-service ==="
          pkill -f "actr.*service-actr" 2>/dev/null || true
          sleep 2
          REALM_ID="${{ steps.realm.outputs.realm_id }}"
          REALM_SECRET="${{ steps.realm.outputs.realm_secret }}"
          cat > /tmp/actrix-ci/service-actr.toml << SVCTOML
          [signaling]
          url = "ws://127.0.0.1:8080/signaling/ws"
          [deployment]
          realm_id = $REALM_ID
          realm_secret = "$REALM_SECRET"
          [discovery]
          visible = true
          [package]
          path = "$(pwd)/ci/datastream-service.actr"
          [[trust]]
          kind = "static"
          pubkey_file = "$(pwd)/ci/dev-pubkey.json"
          SVCTOML
          echo "=== Service config ==="
          cat /tmp/actrix-ci/service-actr.toml
          ci/bin/actr run -c /tmp/actrix-ci/service-actr.toml -d > /tmp/actr-restart.log 2>&1
          echo "=== actr run output ==="
          cat /tmp/actr-restart.log
          echo "Waiting for service to register..."
          for i in $(seq 1 20); do
            sleep 2
            C=$(sqlite3 /tmp/actrix-ci/db/signaling_cache.db "SELECT COUNT(*) FROM service_registry WHERE name='DuplexStreamService' AND status='Available';" 2>/dev/null || echo "0")
            echo "  attempt $i: $C entries"
            if [ "$C" -gt 0 ]; then
              echo "Service registered!"
              break
            fi
          done

          echo "=== Signaling cache ==="
          sqlite3 /tmp/actrix-ci/db/signaling_cache.db "SELECT * FROM service_registry;" 2>/dev/null || echo "(no cache)"

          xcrun simctl boot "$SIM_NAME" || true
          xcrun simctl bootstatus "$SIM_NAME" -b || sleep 10
          xcrun simctl install booted "$APP_PATH"

          echo "=== Launching DataStreamApp ==="
          SIMCTL_CHILD_ACTR_DATASTREAMAPP_AUTO_RUN=1 \
          SIMCTL_CHILD_ACTR_CI_HOST_IP="$HOST_IP" \
            xcrun simctl launch --console booted com.actrium.DataStreamApp > /tmp/probe-output.log 2>&1 &
          SIMCTL_PID=$!
          echo "simctl PID: $SIMCTL_PID"

          # Wait for "Done:" or timeout (180s - WebRTC needs more time)
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if grep -q "Done:" /tmp/probe-output.log 2>/dev/null; then
              echo "Probes completed at ${ELAPSED}s"
              sleep 2
              break
            fi
            # Show progress every 30s
            if [ $((ELAPSED % 30)) -eq 0 ] && [ $ELAPSED -gt 0 ]; then
              echo "[${ELAPSED}s] Waiting for probes... log size: $(wc -c < /tmp/probe-output.log)"
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          echo "=== Probe output ==="
          cat /tmp/probe-output.log

          kill $SIMCTL_PID 2>/dev/null || true

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timeout: probes did not complete within ${TIMEOUT}s"
            exit 1
          fi

      # ── Assert results ──────────────────────────────────────
      - name: Assert 8/8 passed
        run: |
          echo "=== Probe Results ==="
          grep -E "\[DataStreamApp\]" /tmp/probe-output.log || true

          PASS_COUNT=$(grep -cE "\[DataStreamApp\] \[PASS\]" /tmp/probe-output.log || echo 0)
          FAIL_COUNT=$(grep -cE "\[DataStreamApp\] \[FAIL\]" /tmp/probe-output.log || echo 0)
          DONE_LINE=$(grep "Done:" /tmp/probe-output.log || echo "Not found")

          echo ""
          echo "PASS: $PASS_COUNT  FAIL: $FAIL_COUNT"
          echo "Done: $DONE_LINE"

          if [ "$PASS_COUNT" -eq 8 ] && [ "$FAIL_COUNT" -eq 0 ]; then
            echo ""
            echo "✅ E2E PASSED: 8/8 probes"
          else
            echo ""
            echo "❌ E2E FAILED: Expected 8/8, got $PASS_COUNT PASS, $FAIL_COUNT FAIL"
            exit 1
          fi

      # ── Cleanup ─────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          kill $ACTRIX_PID 2>/dev/null || true
          xcrun simctl shutdown "${{ steps.build.outputs.sim_name }}" 2>/dev/null || true
          rm -rf /tmp/actrix-ci /tmp/dd
