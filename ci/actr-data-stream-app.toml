# actr.toml — DataStreamApp CI Runtime Configuration
#
# __HOST_IP__ is replaced at CI runtime with the macOS host IP
# so the iOS Simulator can reach actrix on the host.

[signaling]
url = "ws://__HOST_IP__:8080/signaling/ws"

[ais_endpoint]
url = "http://__HOST_IP__:8080/ais"

[deployment]
realm_id = 1001
realm_secret = "rs_TI1u7FdVIrp1giKCd580-Ap42mE7-kmx"

[discovery]
visible = true

[observability]
filter_level = "info"
tracing_enabled = false

[webrtc]
force_relay = false
stun_urls = ["stun:__HOST_IP__:3478"]
turn_urls = ["turn:__HOST_IP__:3478"]

[acl]

[[acl.rules]]
permission = "allow"
type = "actrium:DuplexStreamService:0.1.0"
