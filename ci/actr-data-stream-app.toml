# actr.toml — DataStreamApp CI Runtime Configuration
#
# __HOST_IP__, __REALM_ID__, __REALM_SECRET__ are replaced at CI runtime.
# The iOS Simulator reaches actrix on the macOS host.

[signaling]
url = "ws://__HOST_IP__:8080/signaling/ws"

[ais_endpoint]
url = "http://__HOST_IP__:8080/ais"

[deployment]
realm_id = __REALM_ID__
realm_secret = "__REALM_SECRET__"

[discovery]
visible = true

[observability]
filter_level = "info"
tracing_enabled = false

[webrtc]
force_relay = false
stun_urls = ["stun:__HOST_IP__:3478"]
turn_urls = ["turn:__HOST_IP__:3478"]

[acl]

[[acl.rules]]
permission = "allow"
type = "actrium:DuplexStreamService:0.1.0"
