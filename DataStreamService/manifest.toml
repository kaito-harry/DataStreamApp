edition = 1

[package]
name = "DuplexStreamService"
manufacturer = "actrium"
version = "0.1.0"
description = "DuplexStreamService for DataStreamApp dev environment"
license = "Apache-2.0"

exports = ["proto/duplex_stream.proto"]

[binary]
path = "../../../target/debug/libdatastream_guest.dylib"
target = "aarch64-apple-darwin"

[build]
tool = "cargo"
manifest_path = "Cargo.toml"
artifact = "lib"
profile = "debug"
target = "aarch64-apple-darwin"
features = ["cdylib"]
